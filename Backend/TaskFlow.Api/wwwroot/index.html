<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <!-- Auth -->
    <div id="auth-section">
      <div class="auth-card">
        <div class="auth-logo">📝</div>
        <h1>TaskFlow</h1>
        <p class="subtitle">Tus notas con checklist</p>
        <div class="tabs">
          <button class="tab active" data-tab="login">Entrar</button>
          <button class="tab" data-tab="register">Crear cuenta</button>
        </div>
        <form id="login-form" class="auth-form">
          <div class="field">
            <label for="login-username">Usuario</label>
            <input type="text" id="login-username" required autocomplete="username">
          </div>
          <div class="field">
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn-primary">Entrar</button>
          <p id="login-error" class="error-msg"></p>
        </form>
        <form id="register-form" class="auth-form hidden">
          <div class="field">
            <label for="reg-username">Usuario</label>
            <input type="text" id="reg-username" required>
          </div>
          <div class="field">
            <label for="reg-password">Contraseña</label>
            <input type="password" id="reg-password" required>
          </div>
          <button type="submit" class="btn-primary">Crear cuenta</button>
          <p id="register-error" class="error-msg"></p>
        </form>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-section" class="hidden">
      <header>
        <div class="header-left">
          <span class="logo">📝</span>
          <h1>TaskFlow</h1>
        </div>
        <div class="header-tabs">
          <button id="view-notes-btn" class="header-tab active" data-view="notes"><i class="fas fa-sticky-note"></i> Notas</button>
          <button id="view-archived-btn" class="header-tab" data-view="archived"><i class="fas fa-archive"></i> Archivadas</button>
        </div>
        <div class="header-search">
          <i class="fas fa-search"></i>
          <input type="text" id="search-input" placeholder="Buscar notas...">
        </div>
        <div class="header-right">
          <button id="view-toggle" class="icon-btn" title="Vista lista"><i class="fas fa-list"></i></button>
          <button id="dark-toggle" class="icon-btn" title="Modo oscuro"><i class="fas fa-moon"></i></button>
          <span id="user-display" class="user-name"></span>
          <button id="logout-btn" class="icon-btn" title="Cerrar sesión"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </header>

      <!-- Labels bar -->
      <div id="labels-bar" class="labels-bar hidden">
        <div class="labels-scroll" id="labels-scroll"></div>
      </div>

      <main>
        <!-- Add note -->
        <div class="add-note-card" id="add-note-card">
          <input type="text" id="note-title-input" placeholder="Título..." maxlength="200">
          <textarea id="note-content-input" class="note-content-input" placeholder="Escribe tu nota aquí..." maxlength="5000" rows="3"></textarea>
          <div class="add-task-row">
            <input type="text" id="task-input" placeholder="Nueva tarea..." maxlength="500">
            <button id="add-task-btn" class="btn-icon"><i class="fas fa-plus"></i></button>
          </div>
          <div id="task-preview" class="task-preview"></div>
          <div class="note-actions">
            <div class="color-picker">
              <button class="color-btn active" data-color=""></button>
              <button class="color-btn" data-color="#f28b82"></button>
              <button class="color-btn" data-color="#fbbc04"></button>
              <button class="color-btn" data-color="#fff475"></button>
              <button class="color-btn" data-color="#ccff90"></button>
              <button class="color-btn" data-color="#a7ffeb"></button>
              <button class="color-btn" data-color="#cbf0f8"></button>
              <button class="color-btn" data-color="#aecbfa"></button>
              <button class="color-btn" data-color="#d7aefb"></button>
              <button class="color-btn" data-color="#fdcfe8"></button>
              <button class="color-btn" data-color="#e8eaed"></button>
            </div>
            <button id="save-note-btn" class="btn-primary btn-sm">Añadir nota</button>
          </div>
          <p id="note-error" class="error-msg" style="margin-top:8px"></p>
        </div>

        <!-- Filter labels -->
        <div id="filter-bar" class="filter-bar hidden">
          <div class="filter-labels" id="filter-labels"></div>
        </div>

        <!-- Notes grid/list -->
        <div id="notes-container"></div>
        <div id="empty-msg" class="empty-state">
          <div class="empty-icon" id="empty-icon">📝</div>
          <p id="empty-text">No hay notas</p>
          <p id="empty-sub" class="empty-sub">Crea tu primera nota</p>
        </div>
      </main>
    </div>
  </div>

  <!-- Note detail modal -->
  <div id="note-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <input type="text" id="modal-title" class="modal-title-input" maxlength="200">
        <button class="icon-btn" id="modal-archive" title="Archivar"><i class="fas fa-archive"></i></button>
        <button class="icon-btn" id="modal-pin" title="Fijar"><i class="far fa-star"></i></button>
        <button class="icon-btn" id="modal-close" title="Cerrar"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-color-picker">
        <button class="color-btn active" data-color=""></button>
        <button class="color-btn" data-color="#f28b82"></button>
        <button class="color-btn" data-color="#fbbc04"></button>
        <button class="color-btn" data-color="#fff475"></button>
        <button class="color-btn" data-color="#ccff90"></button>
        <button class="color-btn" data-color="#a7ffeb"></button>
        <button class="color-btn" data-color="#cbf0f8"></button>
        <button class="color-btn" data-color="#aecbfa"></button>
        <button class="color-btn" data-color="#d7aefb"></button>
        <button class="color-btn" data-color="#fdcfe8"></button>
        <button class="color-btn" data-color="#e8eaed"></button>
      </div>
      <div id="modal-dates" class="modal-dates"></div>
      <!-- Recordatorio -->
      <div class="reminder-row">
        <i class="fas fa-bell"></i>
        <input type="datetime-local" id="modal-reminder">
        <button id="modal-reminder-clear" class="btn-outline btn-sm hidden" title="Quitar recordatorio"><i class="fas fa-times"></i></button>
      </div>
      <textarea id="modal-content" class="modal-content-input" placeholder="Escribe tu nota aquí..." maxlength="5000" rows="4"></textarea>

      <!-- Etiquetas -->
      <div class="modal-section-label"><i class="fas fa-tags"></i> Etiquetas</div>
      <div class="modal-etiquetas" id="modal-etiquetas"></div>
      <div class="modal-add-etiqueta">
        <select id="modal-etiqueta-select"></select>
        <button id="modal-etiqueta-add" class="btn-sm btn-outline">+</button>
      </div>

      <div class="modal-section-label" style="margin-top:12px"><i class="fas fa-check-circle"></i> Lista de tareas</div>
      <div class="modal-tasks" id="modal-tasks"></div>
      <div class="modal-add-task">
        <input type="text" id="modal-task-input" placeholder="+ Añadir tarea" maxlength="500">
      </div>
      <div class="modal-footer">
        <button id="modal-check-all" class="btn-outline btn-sm">✓ Marcar todas</button>
        <button id="modal-restore-note" class="btn-outline btn-sm hidden">Restaurar</button>
        <button id="modal-delete-note" class="btn-outline btn-sm danger">🗑 Eliminar</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="/js/app.js"></script>
</body>
</html>
