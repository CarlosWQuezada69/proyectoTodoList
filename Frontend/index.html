<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Notas con checklist</title>
  <meta name="description" content="TaskFlow es una aplicación de notas con checklist, modo oscuro y archivado. Organiza tus tareas de forma simple y rápida.">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="TaskFlow — Notas con checklist">
  <meta property="og:description" content="Organiza tus notas y tareas con TaskFlow. Checklist, modo oscuro, archivado y más.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://taskflow.app">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="TaskFlow — Notas con checklist">
  <meta name="twitter:description" content="Organiza tus notas y tareas con TaskFlow.">
  <link rel="canonical" href="https://taskflow.app">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TaskFlow">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "TaskFlow",
    "description": "Aplicación de notas con checklist, modo oscuro y archivado.",
    "applicationCategory": "Productivity",
    "operatingSystem": "Any",
    "browserRequirements": "Requires JavaScript"
  }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Auth -->
    <div id="auth-section">
      <div class="auth-bg"></div>
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-card-inner">
            <header class="auth-header">
              <div class="auth-avatar" aria-hidden="true">📝</div>
              <h1>TaskFlow</h1>
              <p class="auth-subtitle">Tus notas con checklist</p>
            </header>
            <div class="auth-tabs">
              <button class="auth-tab active" data-tab="login">Entrar</button>
              <button class="auth-tab" data-tab="register">Crear cuenta</button>
              <div class="auth-tab-indicator"></div>
            </div>
            <div class="auth-forms">
              <form id="login-form" class="auth-form">
                <div class="mfield">
                  <input type="text" id="login-username" required autocomplete="username" class="mfield-input" placeholder=" ">
                  <label for="login-username" class="mfield-label">Usuario</label>
                  <span class="mfield-bar"></span>
                  <i class="fas fa-user mfield-icon"></i>
                </div>
                <div class="mfield">
                  <input type="password" id="login-password" required autocomplete="current-password" class="mfield-input" placeholder=" ">
                  <label for="login-password" class="mfield-label">Contraseña</label>
                  <span class="mfield-bar"></span>
                  <i class="fas fa-lock mfield-icon"></i>
                </div>
                <button type="submit" class="mbtn">Entrar</button>
                <p id="login-error" class="auth-error"></p>
              </form>
              <form id="register-form" class="auth-form hidden">
                <div class="mfield">
                  <input type="text" id="reg-username" required class="mfield-input" placeholder=" ">
                  <label for="reg-username" class="mfield-label">Usuario</label>
                  <span class="mfield-bar"></span>
                  <i class="fas fa-user-plus mfield-icon"></i>
                </div>
                <div class="mfield">
                  <input type="password" id="reg-password" required class="mfield-input" placeholder=" ">
                  <label for="reg-password" class="mfield-label">Contraseña</label>
                  <span class="mfield-bar"></span>
                  <i class="fas fa-lock mfield-icon"></i>
                </div>
                <button type="submit" class="mbtn">Crear cuenta</button>
                <p id="register-error" class="auth-error"></p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main App -->
    <section id="main-section" class="hidden">
      <!-- Navbar -->
      <header class="navbar" role="banner">
        <div class="navbar-left">
          <span class="navbar-logo" aria-hidden="true">📝</span>
          <span class="navbar-brand">TaskFlow</span>
        </div>
        <div class="navbar-search" role="search">
          <i class="fas fa-search" aria-hidden="true"></i>
          <input type="text" id="search-input" placeholder="Buscar notas" aria-label="Buscar notas">
        </div>
        <div class="navbar-right">
          <button id="refresh-btn" class="icon-btn hide-mobile" title="Refrescar" aria-label="Refrescar"><i class="fas fa-redo" aria-hidden="true"></i></button>
          <button id="export-btn" class="icon-btn hide-mobile" title="Exportar notas" aria-label="Exportar notas"><i class="fas fa-download" aria-hidden="true"></i></button>
          <button id="view-toggle" class="icon-btn hide-mobile" title="Cambiar vista" aria-label="Cambiar vista"><i class="fas fa-list" aria-hidden="true"></i></button>
          <button id="dark-toggle" class="icon-btn hide-mobile" title="Modo oscuro" aria-label="Modo oscuro"><i class="fas fa-moon" aria-hidden="true"></i></button>
          <span id="user-display" class="user-name hide-mobile" aria-live="polite"></span>
          <button id="logout-btn" class="icon-btn hide-mobile" title="Cerrar sesión" aria-label="Cerrar sesión"><i class="fas fa-sign-out-alt" aria-hidden="true"></i></button>
          <button id="menu-btn" class="icon-btn show-mobile" title="Menú" aria-label="Abrir menú"><i class="fas fa-bars" aria-hidden="true"></i></button>
        </div>
      </header>

      <!-- App Body -->
      <div class="app-body">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar" aria-label="Barra lateral">
          <nav class="sidebar-nav" aria-label="Navegación principal">
            <button id="view-notes-btn" class="sidebar-item active" data-view="notes" aria-label="Notas">
              <i class="fas fa-sticky-note" aria-hidden="true"></i>
              <span class="sidebar-label">Notes</span>
            </button>
            <button id="sidebar-reminders" class="sidebar-item" data-view="reminders" aria-label="Recordatorios">
              <i class="fas fa-bell" aria-hidden="true"></i>
              <span class="sidebar-label">Reminders</span>
            </button>
            <button id="sidebar-labels" class="sidebar-item" data-view="labels" aria-label="Etiquetas">
              <i class="fas fa-tag" aria-hidden="true"></i>
              <span class="sidebar-label">Edit labels</span>
            </button>
            <button id="view-archived-btn" class="sidebar-item" data-view="archived" aria-label="Archivadas">
              <i class="fas fa-archive" aria-hidden="true"></i>
              <span class="sidebar-label">Archive</span>
            </button>
            <button id="sidebar-trash" class="sidebar-item" data-view="trash" aria-label="Papelera">
              <i class="fas fa-trash-alt" aria-hidden="true"></i>
              <span class="sidebar-label">Trash</span>
            </button>
          </nav>
        </aside>

        <!-- Main Content -->
        <main>
          <div id="notes-container"></div>
          <div id="scroll-sentinel" style="height:1px"></div>
          <div id="empty-msg" class="empty-state">
            <div class="empty-icon" id="empty-icon">📝</div>
            <p id="empty-text">No hay notas</p>
            <p id="empty-sub" class="empty-sub">Presiona + para crear tu primera nota</p>
          </div>
        </main>
      </div>

      <!-- Mobile menu overlay -->
      <nav id="mobile-menu" class="mobile-menu hidden" role="navigation" aria-label="Menú móvil">
        <div class="mobile-menu-backdrop"></div>
        <div class="mobile-menu-panel">
          <div class="mobile-menu-header">
          <span class="navbar-logo">📝</span>
            <span class="user-name" id="menu-user-name"></span>
            <button id="menu-close" class="icon-btn"><i class="fas fa-times"></i></button>
          </div>
          <div class="mobile-menu-body">
            <button id="menu-notes-btn" class="menu-item active" data-view="notes">
              <i class="fas fa-sticky-note"></i> Notas
            </button>
            <button id="menu-archived-btn" class="menu-item" data-view="archived">
              <i class="fas fa-archive"></i> Archivadas
            </button>
            <hr class="menu-divider">
            <button id="menu-view-toggle" class="menu-item">
              <i class="fas fa-list"></i> <span id="menu-view-text">Vista lista</span>
            </button>
            <button id="menu-dark-toggle" class="menu-item">
              <i class="fas fa-moon"></i> <span id="menu-dark-text">Modo oscuro</span>
            </button>
            <hr class="menu-divider">
            <button id="menu-logout" class="menu-item menu-danger">
              <i class="fas fa-sign-out-alt"></i> Cerrar sesión
            </button>
          </div>
        </div>
      </div>

      <button id="fab-btn" class="fab" title="Nueva nota"><i class="fas fa-plus"></i></button>
    </section>
  </div>

  <!-- Modal -->
  <div id="note-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Editor de nota">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <input type="text" id="modal-title" class="modal-title-input" maxlength="200" placeholder="Título...">
        <div class="modal-header-right">
          <div class="dropdown-3dots">
            <button class="icon-btn" id="modal-dots" title="Más opciones"><i class="fas fa-ellipsis-v"></i></button>
            <div id="modal-dots-menu" class="dots-menu hidden">
              <button id="dots-edit" class="dots-item"><i class="fas fa-pen"></i> Editar</button>
              <button id="dots-delete" class="dots-item dots-danger"><i class="fas fa-trash-alt"></i> Eliminar</button>
              <button id="dots-archive" class="dots-item"><i class="fas fa-archive"></i> Archivar</button>
              <button id="dots-restore" class="dots-item hidden"><i class="fas fa-undo"></i> Restaurar</button>
            </div>
          </div>
          <button class="icon-btn" id="modal-close" title="Cerrar"><i class="fas fa-times"></i></button>
        </div>
      </div>

      <!-- Content area -->
      <textarea id="modal-content" class="modal-content-input" placeholder="Escribe tu nota aquí..." maxlength="5000" rows="4"></textarea>

      <!-- Task section -->
      <div class="tasks-section">
        <div class="modal-section-label"><i class="fas fa-check-circle"></i> Lista de tareas</div>
        <div class="modal-tasks" id="modal-tasks"></div>
        <div class="modal-add-task">
          <input type="text" id="modal-task-input" placeholder="+ Añadir tarea" maxlength="500">
        </div>
      </div>

      <!-- Bottom bar: reminder, dates -->
      <div class="modal-bottom-bar">
        <div class="modal-bottom-right">
          <button class="icon-btn icon-btn-sm" id="modal-reminder-btn" title="Recordatorio"><i class="fas fa-bell"></i></button>
          <div id="modal-dates" class="modal-dates"></div>
        </div>
      </div>

      <!-- Reminder picker (hidden by default) -->
      <div id="modal-reminder-row" class="reminder-row hidden">
        <input type="datetime-local" id="modal-reminder">
        <button id="modal-reminder-clear" class="btn-outline btn-sm" title="Quitar recordatorio"><i class="fas fa-times"></i></button>
      </div>

      <div id="modal-footer-actions">
        <button id="modal-save-btn" class="mbtn hidden" style="width:100%">Guardar cambios</button>
        <button id="modal-create-btn" class="mbtn hidden" style="width:100%">Crear nota</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>
  <dialog id="confirmDeleteModal">
    <form method="dialog">
      <h3 id="confirm-msg">¿Eliminar esta nota?</h3>
      <p>Esta acción no se puede deshacer.</p>
      <div class="confirm-actions">
        <button value="cancel" class="confirm-cancel" autofocus>Cancelar</button>
        <button value="confirm" class="confirm-delete">Eliminar</button>
      </div>
    </form>
  </dialog>
  <script src="js/app.js"></script>
</body>
</html>
